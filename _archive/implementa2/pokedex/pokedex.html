<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UFT-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
</head>

<link rel="stylesheet" href="pokedex.css">

<body>
    <h1>MAESTRO POKEMON: Luis Fernando Dominguez Peralta</h1>
    <img src="./descarga.png" width="400px" style="top:200px;" class="pokeimg1" >
    <input type="text" placeholder="Greninja" id="pokeName" name="pokeName"
    class="placeholder"> <br>
    <img src="./logo.png" alt="PokemonMaster" id="pokeImg" width="250px" class="pokeimg"> <br>

    <div id="pokename" class="pokeimg1" style="left: 500px; top: 200px; font-size: 15px;"></div>
     <div id="pokeHe" class="pokeimg1" style="left: 500px; top: 220px; font-size: 15px;"></div>
      <div id="pokeWe" class="pokeimg1" style="left: 500px; top: 240px; font-size: 15px;"></div>
       <div id="pokeType" class="pokeimg1" style="left: 500px; top: 260px; font-size: 15px;"></div>
        <div id="pokeitem" class="pokeimg1" style="left: 500px; top: 280px; font-size: 15px;"></div>
         <div id="pokemove1" class="pokeimg1" style="left: 500px; top: 300px; font-size: 15px;"></div>
          <div id="pokemove2" class="pokeimg1" style="left: 500px; top: 320px; font-size: 15px;"></div>
           <div id="pokemove3" class="pokeimg1" style="left: 500px; top: 340px; font-size: 15px;"></div>
         <div id="pokemove4" class="pokeimg1" style="left: 500px; top: 360px; font-size: 15px;"></div>

    <div id="pokeid" class="pokeimg1" style="left: 500px; top: 380px; font-size: 15px; color: rgb(255, 255, 255);"></div>
    <div id="pokeorder" class="pokeimg1" style="left: 500px; top: 400px; font-size: 15px; color: orange;"></div>
    <button onclick="fetchPokemon()" class="button">Presiona</button>
    <div class="grafica">
        <canvas id="miCanvas"></canvas>
    </div>
    <script src="pokedex.js"></script>
    <script src="Chart.js"></script>
</body>
</html>
