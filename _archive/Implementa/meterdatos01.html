  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap-theme.min.css">

  <!-- Fuente -->

  <style>
    :root {
      --color-de-fondo: #BFDBF7;
      --color-de-letras: #053C5E;
      --color-de-barra: #A31621;
      --color-de-botones: #1F7A8C;
      --color-extra: #DB222A;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--color-de-letras);
      color: white;
      padding: 20px;
    }

    h1 {
      color: var(--color-extra);
      text-align: center;
      margin-top: 30px;
    }

    form {
      width: 50%;
      margin: auto;
      background: rgba(0, 0, 0, 0.5);
      padding: 20px;
      border-radius: 10px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: white;
    }

    input[type="text"],
    input[type="date"],
    textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid yellow;
      border-radius: 5px;
      background-color: #1f1f1f;
      color: white;
      box-sizing: border-box;
    }

    input[type="submit"] {
      background-color: yellow;
      color: black;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: url('batman_01.jpg') center/cover no-repeat;
      opacity: 0.3;
    }

    table {
      border-collapse: collapse;
      width: 95%;
      background-color: white;
      margin: 20px auto;
      color: #333;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background-color: #3498db;
      color: white;
      padding: 15px;
      text-align: left;
    }

    td {
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    .biografia {
      font-style: italic;
      color: #555;
      max-width: 200px;
    }

    .navbar {
      background: #111;
      border: none;
    }

    .navbar-brand,
    .navbar-nav>li>a {
      color: white !important;
    }

    .dropdown-menu {
      background: #222;
    }

    .dropdown-menu>li>a {
      color: white;
    }

    .dropdown-menu>li>a:hover {
      background: #333;
    }
  </style>
</head>

  <h1>
    Registro de tabla
  </h1>

  <form>

    <label>Nombre Real:</label>
    <input type="text" name="nombrereal" required>

    <label>Alias (Personaje):</label>
    <input type="text" name="personaje" required>

    <label>Altura (cm):</label>
    <input type="text" name="altura" required>

    <label>Peso (kg):</label>
    <input type="text" name="peso" required>

    <label>Superpoderes:</label>
    <input type="text" name="poderes" required>

    <label>Debilidad:</label>
    <input type="text" name="debilidad" required>

    <label>Sexo:</label>
    <input type="text" name="sexo" required>

    <label>Fecha de Creación:</label>
    <input type="date" name="creacion" required>

    <label>Biografía:</label>
    <textarea name="biografia" required></textarea>

    <input type="submit" value="Guardar Personaje">

  </form>
